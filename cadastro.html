<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/cadastro.css">
    <title>Cadastramento</title>
</head>

<body>
    <div class="box">
        <form action="conexaocadastro.php" method="post">
            <fieldset>
                <legend><b>Formulário De Cadastro</b></legend>
                <br>
                <h3>Informações Pessoais</h3>
                <div class="inputBox">
                    <input type="text" name="nome" id="nome" class="inputUser" placeholder="Nome completo" required>
                </div>
                <br>
                <div class="inputBox">
                    <input type="text" name="cpf" maxlength="11" pattern="[0-9]{11}" id="cpf" class="inputUser"
                        placeholder="CPF sem pontos e traços" required>
                </div>
                <br>
                <div class="inputBox">
                    <input type="text" name="rg" id="rg" class="inputUser" placeholder="RG sem pontos e traços"
                        required>
                </div>
                <br>
                <div class="inputBox">
                    <input type="email" name="email" id="email" class="inputUser" placeholder="Email" required>
                </div>
                <br>
                <div class="inputBox">
                    <input type="tel" name="telefone" id="telefone" class="inputUser" placeholder="Telefone" required>
                </div>
                <br>
                <h3>Sexo</h3>
                <input type="radio" id="feminino" name="genero" value="feminino" required>
                <label for="feminino">Feminino</label>
                <input type="radio" id="masculino" name="genero" value="masculino" required>
                <label for="masculino">Masculino</label>
                <br><br>
                <div>
                    <label for="datanascimento">Data De Nascimento: </label>
                    <input type="date" name="datanascimento" id="datanascimento" required>
                </div>
                <br>
                <h3>Endereço</h3>
                <div class="inputBox">
                    <input type="text" name="pais" id="pais" class="inputUser" placeholder="País" required>
                </div>
                <br>
                <div class="inputBox">
                    <input type="text" name="estado" id="estado" class="inputUser" placeholder="Estado" required>
                </div>
                <br>
                <div class="inputBox">
                    <input type="text" name="cidade" id="cidade" class="inputUser" placeholder="Cidade" required>
                </div>
                <br>
                <div class="inputBox">
                    <input type="text" name="rua" id="rua" class="inputUser" placeholder="Endereço" required>
                </div>
                <br>
                <div class="inputBox">
                    <input type="text" name="numeroresi" id="numeroresi" class="inputUser"
                        placeholder="Número da residência" required>
                </div>
                <br>
                <h3>Situação Financeira</h3>
                <div class="inputBox">
                    <input type="number" name="salario" id="salario" step="0.01" class="inputUser"
                        placeholder="Salário" required>
                </div>
                <br>
                <div class="inputBox">
                    <input type="number" name="valorapli" step="0.01" id="valorapli" class="inputUser"
                        placeholder="Valor a ser aplicado" required>
                </div>
                <br>
                <button type="submit" name="submit" id="submit">ENVIAR</button>
            </fieldset>
        </form>
    </div>
</body>

</html>
