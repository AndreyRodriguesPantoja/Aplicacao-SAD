<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/login-screen.css" />
    <title>Login — SAD Super Seguro</title>
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-logo">
          <div class="logo-icon">🛡️</div>
          <h4>SAD Super Seguro</h4>
          <p>Sistema de Apoio à Decisão — Acesso Interno</p>
        </div>

        <!-- Mensagem de erro dinâmica -->
        <div class="error-msg" id="errorMsg"></div>

        <form action="login.php" method="POST" id="loginForm">
          <div style="margin-bottom: 1rem">
            <label class="form-label" for="usuario">Usuário</label>
            <div class="input-icon-wrap">
              <span class="icon">👤</span>
              <input
                type="text"
                id="usuario"
                name="usuario"
                placeholder="Digite seu usuário"
                required
                autocomplete="username"
              />
            </div>
          </div>

          <div style="margin-bottom: 1rem">
            <label class="form-label" for="senha">Senha</label>
            <div class="input-icon-wrap">
              <span class="icon">🔒</span>
              <input
                type="password"
                id="senha"
                name="senha"
                placeholder="Digite sua senha"
                required
                autocomplete="current-password"
              />
            </div>
          </div>

          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 1.25rem;
              font-size: 0.85rem;
            "
          >
            <label
              style="
                display: flex;
                align-items: center;
                gap: 0.4rem;
                cursor: pointer;
                color: #374151;
              "
            >
              <input type="checkbox" name="lembrar" /> Lembrar-me
            </label>
            <a href="recuperar_senha.html">Esqueci minha senha</a>
          </div>

          <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
        </form>
      </div>
    </div>

    <script>
      // Mapeamento de códigos de erro da query string
      const ERROS = {
        credenciais: "Usuário ou senha inválidos.",
        campos_vazios: "Preencha o usuário e a senha.",
        sistema: "Erro interno. Tente novamente.",
        sessao: "Sua sessão expirou. Faça login novamente.",
      };

      const params = new URLSearchParams(location.search);
      const codigoErro = params.get("erro");
      if (codigoErro) {
        const el = document.getElementById("errorMsg");
        el.textContent = ERROS[codigoErro] || "Erro ao fazer login.";
        el.style.display = "block";
      }

      // Feedback de loading no botão
      document
        .getElementById("loginForm")
        .addEventListener("submit", function () {
          const btn = document.getElementById("btnLogin");
          btn.textContent = "Entrando…";
          btn.disabled = true;
        });
    </script>
  </body>
</html>
